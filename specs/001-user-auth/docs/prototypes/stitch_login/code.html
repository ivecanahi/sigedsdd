<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SIGED - Inicio de Sesión</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Fonts: Manrope & Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#f3f4f6",
              "primary": "#4c6ef5",
              "primary-dim": "#3b5bdb",
              "on-surface": "#2f3542",
              "on-surface-variant": "#6b7280",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f9fafb",
              "outline": "#6b7280",
              "outline-variant": "#d1d5db",
              "error-dim": "#e03131",
              "on-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased overflow-x-hidden">
<!-- Shell Suppression: Login screen is transactional/linear, so TopAppBar and BottomNavBar are excluded -->
<main class="min-h-screen w-full flex flex-col md:flex-row">
<!-- Left Panel: Atmosphere -->
<section class="w-full md:w-1/2 min-h-[409px] md:min-h-screen bg-primary flex flex-col items-center justify-center p-8 md:p-16 relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-primary to-[#364fc7] opacity-90 z-0"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
<div class="relative z-10 flex flex-col items-center text-center max-w-md">
<!-- Illustration -->
<div class="w-full max-w-[320px] md:max-w-[420px] mb-8 drop-shadow-2xl">
<img alt="Sistema de Información y Gestión Educativa" class="w-full h-auto object-contain" data-alt="3D stylized illustration of a sleek silver laptop resting on a neatly organized stack of colorful educational hardcover books on a purple background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYd5HcUYH2gi2PHSBd6DXciufS_e4-aPNwJYpYq_MRrWADHtUVeRM-V-h94MyQiarTsWYIqxfSJst_jUAgLK4VqKylQzapnpk9gYK8elu_hfmwN15FvmOqerhnw6CTQA9P3d1R8uUO1pkKk2CT0qgFDvbdIPunnTL8LQal-cbRIScaaj04CXH1efEem6PFxBfzjM0D0ovS24TR1hrpIe77HqRUJQAD-bXSohDjmndQYzCHKkJgpIq_S8mYTTWz97f5FXjNokA74KIo"/>
</div>
<!-- Product Identity -->
<h1 class="text-white italic font-headline text-lg md:text-2xl leading-relaxed tracking-wide opacity-90">
                    Sistema de Información y Gestión Educativa (SIGED)
                </h1>
</div>
</section>
<!-- Right Panel: Canvas -->
<section class="w-full md:w-1/2 flex items-center justify-center p-6 md:p-12 bg-surface-container-lowest">
<div class="w-full max-w-md space-y-10">
<!-- Header -->
<div class="space-y-4">
<div class="flex items-center gap-3">
<div class="w-12 h-1 bg-primary rounded-full"></div>
<span class="text-primary font-headline font-extrabold text-3xl tracking-tight">SIGED</span>
</div>
<p class="text-on-surface-variant font-medium text-lg">
                        Ingrese sus credenciales para acceder al sistema
                    </p>
</div>
<!-- Form -->
<form action="#" class="space-y-8" onsubmit="return false;">
<!-- Identification Field -->
<div class="space-y-2">
<label class="block font-bold text-on-surface text-sm uppercase tracking-wider" for="id-number">
                            Número de identificación <span class="text-error-dim">*</span>
</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-low border-outline-variant border-2 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 text-on-surface placeholder:text-on-surface-variant/60" id="id-number" name="id-number" placeholder="Ingresa su número de identificación" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-bold text-on-surface text-sm uppercase tracking-wider" for="password">
                            Contraseña <span class="text-error-dim">*</span>
</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-low border-outline-variant border-2 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 text-on-surface placeholder:text-on-surface-variant/60" id="password" name="password" placeholder="Ingresa su contraseña" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full flex items-center justify-center gap-3 py-4 bg-primary hover:bg-primary-dim text-on-primary font-headline font-bold text-lg rounded-full shadow-lg shadow-primary/20 transform active:scale-[0.98] transition-all duration-200 group" type="submit">
<svg class="w-6 h-6 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
                            Ingresar al sistema
                        </button>
</div>
</form>
<!-- Footer Support Links (Contextual) -->
</div>
</section>
</main>
<!-- Global Footer -->
<footer class="w-full py-6 px-8 bg-background text-center md:absolute md:bottom-0 md:right-0 md:w-1/2">
<p class="text-xs text-on-surface-variant font-label uppercase tracking-widest">@ 2026 SIGED</p>
</footer>
</body></html>
